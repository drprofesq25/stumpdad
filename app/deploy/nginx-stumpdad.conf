# StumpDad behind nginx with TLS.
# OPTION A — subdomain (recommended). Point a DNS A record (e.g. stumpdad.yourdomain.com)
# at the droplet, drop this in /etc/nginx/sites-available/stumpdad, symlink to
# sites-enabled, `nginx -t && systemctl reload nginx`, then run certbot.
#
#   sudo ln -s /etc/nginx/sites-available/stumpdad /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d stumpdad.yourdomain.com

server {
    listen 80;
    server_name stumpdad.yourdomain.com;   # <-- change me

    location / {
        proxy_pass         http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# OPTION B — path under an existing site (e.g. https://yourdomain.com/stumpdad/).
# Add this location block inside your existing server { } that already has TLS.
# Note: the app uses absolute asset paths, so a subdomain (Option A) is simpler
# and avoids base-path rewriting. Prefer Option A unless you specifically need a path.
#
#   location /stumpdad/ {
#       proxy_pass http://127.0.0.1:8088/;
#       proxy_set_header Host $host;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
